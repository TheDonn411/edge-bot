name: Refresh Demo Data

on:
  schedule:
    # 21:20 UTC is safely after the US cash close in both EST and EDT.
    # Keeping one run per weekday protects the FMP free-tier call budget.
    - cron: "20 21 * * 1-5"
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Build demo dataset
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/build_demo_dataset.py

      - name: Commit refreshed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo_app/static/data/stocks.json demo_app/static/data/meta.json
          git diff --cached --quiet || git commit -m "chore: refresh demo market data"
          git push
